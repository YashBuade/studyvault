name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://ci_user:ci_password@127.0.0.1:5432/studyvault?sslmode=disable"
      DIRECT_URL: "postgresql://ci_user:ci_password@127.0.0.1:5432/studyvault?sslmode=disable"
      AUTH_SECRET: "ci-placeholder-secret"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run build
